version: "3.9"

services:
  api:
    build: .
    container_name: fastapi_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WORD_TEMPLATE_PATH: /data/Template.docx
      QUOTES_TEMPLATE_PATH: /data/Template_quotes.docx
      QUOTES_ALL_TEMPLATE_PATH: /data/Template_quotes_all.docx
    volumes:
      - ./volumes/word-template:/data
    networks:
      - internal

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_EDITOR_BASE_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Europe/Moscow
    volumes:
      - n8n_data:/home/node/.n8n
      - /home/razil/projects/n8n/test_docs:/home/node/.n8n-files:ro
    networks:
      - internal
    depends_on:
      - api
      - postgres

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quotes
      POSTGRES_USER: quotes_user
      POSTGRES_PASSWORD: quotes_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - internal
networks:
  internal:

volumes:
  n8n_data:
  pgdata:
  minio_data:
